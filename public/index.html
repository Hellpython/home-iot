<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Smart Home</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f1f5f9;
            --accent: #38bdf8;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 600px; width: 100%; }
        header { margin-bottom: 30px; text-align: center; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 4px 0 0; color: #94a3b8; font-size: 0.9rem; }
        .status { font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        button {
            background: var(--accent);
            color: #000; border: none;
            padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }
        button.off { background: #475569; color: #fff; }
        
        /* 로그 섹션 스타일 */
        .logs {
            margin-top: 40px; background: rgba(0,0,0,0.3);
            border-radius: 16px; padding: 16px;
        }
        .logs h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 12px; }
        .log-item {
            font-size: 0.85rem; padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 10px;
        }
        .log-time { color: var(--accent); font-weight: bold; min-width: 80px; }
        .log-action { color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Home IoT Server</h1>
            <p id="time"></p>
        </header>
        
        <div id="device-list">
            <p>데이터를 불러오는 중...</p>
        </div>

        <div class="logs">
            <h2>최근 활동 기록</h2>
            <div id="log-list">
                <p>기록 없음</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'my-secret-iot-key';

        async function fetchData() {
            try {
                // 1. 장치 상태 조회
                const devRes = await fetch('/devices?t=' + Date.now());
                const devices = await devRes.json();
                renderDevices(devices);

                // 2. 최근 로그 조회
                const logRes = await fetch('/devices/logs?t=' + Date.now());
                const logs = await logRes.json();
                renderLogs(logs);
            } catch (e) { console.error('Data fetch error:', e); }
        }

        async function toggleDevice(id, currentStatus) {
            const nextStatus = currentStatus === 'ON' ? 'OFF' : 'ON';
            try {
                await fetch(`/devices/${id}/control`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify({ status: nextStatus })
                });
                fetchData();
            } catch (e) { console.error('Control error:', e); }
        }

        function renderDevices(devices) {
            const list = document.getElementById('device-list');
            list.innerHTML = '';
            devices.forEach(d => {
                const card = document.createElement('div');
                card.className = 'card';
                if (d.type === 'sensor') {
                    card.innerHTML = `<div class="info"><h3>${d.name}</h3><p>현재 측정값</p></div><div class="status">${d.value}${d.unit}</div>`;
                } else {
                    card.innerHTML = `
                        <div class="info"><h3>${d.name}</h3><p>${d.type === 'ac' ? 'Smart AC' : 'Light'}</p></div>
                        <button class="${d.status === 'OFF' ? 'off' : ''}" onclick="toggleDevice('${d.id}', '${d.status}')">${d.status}</button>
                    `;
                }
                list.appendChild(card);
            });
        }

        function renderLogs(logs) {
            const list = document.getElementById('log-list');
            if (!logs || logs.length === 0) return;
            list.innerHTML = '';
            logs.forEach(log => {
                const timeStr = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<span class="log-time">[${timeStr}]</span><span class="log-action"><b>${log.deviceName}</b> ${log.action}됨</span>`;
                list.appendChild(item);
            });
        }

        setInterval(fetchData, 3000);
        fetchData();
        setInterval(() => { document.getElementById('time').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
